# ── Customer Support MCP — Docker Compose ─────────────────────────────────────
#
# Services
# ────────
#  postgres  PostgreSQL 16 — persistent relational store
#  redis     Redis 7 — session cache / rate-limiter state (future use)
#  backend   FastAPI + MCP server bundled (port 8000)
#  frontend  React/Vite → nginx static serve (port 3000)
#  ollama    Local LLM fallback (GPU-optional)
#
# Usage
# ─────
#  docker compose up --build          # first time
#  docker compose up -d               # detached
#  docker compose logs -f backend     # tail backend logs
#  docker compose down -v             # stop + remove volumes
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: customersupport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${POSTGRES_DB:-support}"
      POSTGRES_USER:     "${POSTGRES_USER:-support}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-support}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: customersupport-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM – free, unlimited, used when all Groq quota is gone) ─
  ollama:
    image: ollama/ollama:latest
    container_name: customersupport-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    # Starts the Ollama server then pulls the model (skipped on subsequent
    # restarts because the model is stored in the named volume).
    entrypoint: ["/bin/sh", "-c",
      "ollama serve & until ollama list 2>/dev/null; do sleep 2; done && ollama pull llama3.2 && wait"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    # ── GPU support (optional) ──────────────────────────────────────────────
    # Uncomment the section below if you have an NVIDIA GPU and want GPU inference.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── FastAPI backend (bundles MCP server as subprocess) ────────────────────
  backend:
    build:
      context: ..                                    # parent: dambar projects/
      dockerfile: customersupportmcp-ui/backend/Dockerfile
    image: customersupport-backend:latest
    container_name: customersupport-backend
    restart: unless-stopped
    env_file:
      - ../customersupportmcp/.env          # supplies GROQ_API_KEY & GROQ_MODEL
    environment:
      # MCP server path inside the container (set in Dockerfile)
      MCP_SERVER_PATH: /app/mcp_server/main.py
      # CORS – frontend URL as seen by the browser
      FRONTEND_URL: "http://localhost:3000"
      # Logging
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      # Uvicorn
      PORT: "8000"
      # Ollama fallback — connects to the ollama service in this compose stack
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_ENABLED: "true"
      # PostgreSQL (overrides SQLite)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-support}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-support}"
      # Redis
      REDIS_URL: "redis://redis:6379/0"
      # JWT — CHANGE THIS IN PRODUCTION
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production-use-a-32-char-random-secret}"
      JWT_EXPIRE_MINUTES: "${JWT_EXPIRE_MINUTES:-480}"
      # OAuth2 social login (leave empty to disable)
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      FACEBOOK_APP_ID: "${FACEBOOK_APP_ID:-}"
      FACEBOOK_APP_SECRET: "${FACEBOOK_APP_SECRET:-}"
      OAUTH_REDIRECT_BASE_URL: "${OAUTH_REDIRECT_BASE_URL:-http://localhost:8000}"
      # Password reset email
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      EMAIL_FROM: "${EMAIL_FROM:-noreply@example.com}"
      EMAIL_ENABLED: "${EMAIL_ENABLED:-false}"
      RESET_TOKEN_EXPIRE_MINUTES: "${RESET_TOKEN_EXPIRE_MINUTES:-30}"
      # Rate limiting
      RATE_LIMIT_AUTH: "${RATE_LIMIT_AUTH:-5/minute}"
      RATE_LIMIT_RESET: "${RATE_LIMIT_RESET:-3/minute}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started   # don't block – model pull runs in background
    ports:
      - "8000:8000"
    volumes:
      # Persist log files across restarts
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ..                                    # parent: dambar projects/
      dockerfile: customersupportmcp-ui/frontend/Dockerfile
      args:
        # Tell the Vite bundle where the backend is reachable from the browser.
        # In this compose setup nginx proxies /api and /ws to the backend
        # service, so the value is an empty string (same origin).
        VITE_API_URL: ""
    image: customersupport-frontend:latest
    container_name: customersupport-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  ollama_models:    # persists pulled models — survives container restarts
